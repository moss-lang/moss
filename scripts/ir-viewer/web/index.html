<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moss IR Viewer</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <div class="page">
      <main class="panes">
        <section class="pane raw-pane">
          <div class="pane-header raw-pane-header">
            <div class="pane-title">Raw IR</div>
            <input
              id="filter"
              type="search"
              placeholder="Filter lines by text"
              autocomplete="off"
            />
            <button id="clear-all" type="button">Clear All</button>
          </div>
          <div id="lines" class="lines"></div>
        </section>
        <section class="pane graph-pane">
          <div class="pane-header">
            <div class="pane-title">Focused Graph</div>
            <div id="graph-meta" class="graph-meta"></div>
          </div>
          <div id="graph" class="graph"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
