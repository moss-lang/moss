<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moss IR Viewer</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div>
          <h1>Moss IR Viewer</h1>
          <p id="status">Loading…</p>
        </div>
        <div class="controls">
          <button id="reload" type="button">Reload</button>
          <button id="select-visible" type="button">Select Visible</button>
          <button id="clear-visible" type="button">Clear Visible</button>
          <button id="clear-all" type="button">Clear All</button>
          <label class="checkbox-pill">
            <input id="auto-reload" type="checkbox" checked />
            Auto-reload
          </label>
        </div>
      </header>

      <section class="toolbar">
        <input
          id="filter"
          type="search"
          placeholder="Filter lines by text"
          autocomplete="off"
        />
        <label class="checkbox-pill">
          <input id="show-selected-only" type="checkbox" />
          Selected only
        </label>
        <div id="summary"></div>
      </section>

      <main class="panes">
        <section class="pane raw-pane">
          <div class="pane-title">Raw IR</div>
          <div id="lines" class="lines"></div>
        </section>
        <section class="pane graph-pane">
          <div class="pane-title">Focused Graph</div>
          <div id="graph-meta" class="graph-meta"></div>
          <div id="graph" class="graph"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
